[pytest]
# `tests/` = the classic app + ML core. `studio/tests/` = the Studio app's own
# suite. `server/tests/` = the multi-user backend (pure stdlib, no heavy deps,
# so it runs in CI's light `test` group like the pure-logic core). When working
# on one area, run just its dir (e.g. `pytest server/tests`).
testpaths = tests studio/tests server/tests
pythonpath = .
addopts = -q
filterwarnings =
    ignore::DeprecationWarning
